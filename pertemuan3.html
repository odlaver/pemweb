<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pertemuan 3</title>
</head>
<body>
    <h1>Form Kehadiran Praktikan</h1>
    <label for="Nama">Nama:</label>
    <input type="text" placeholder="Masukkan nama" /><br />
    <br>

    <label for="NPM">NPM :</label>
    <input type="text" placeholder="Masukkan npm" /><br />
    <br>

    <label for="Kelas">Kelas:</label>
    

    <select id=opsi name="Pilih kelas">
        <option selected disabled hidden>Pilih kelas</option>
        <option>SI</option>
        <option>MI</option>
        <option>ILKOMP</option>
    </select>
    <br>

    <br>
    <label for="Tanggal">Tanggal:</label>
    <input type="date" /><br />
    <br>

    <label for="Waktu">Waktu:</label>
    <input type="time" /><br />
    <br>

    <input type="submit" placeholder="Masukkan nama" /><br />
</body>
</html>
